        const reports = JSON.parse(localStorage.getItem('sinan_reports') || '[]');

            historyBtn.classList.remove('hidden');
            renderHistory(reports);
        }
    }

    function renderHistory(reports) {
        historyList.classList.remove('hidden');
        historyItems.innerHTML = reports.map((r, i) => `
            <div class="bg-white rounded-lg p-4 shadow-sm cursor-pointer hover:shadow-md transition" onclick="viewReport(${i})">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="font-bold text-gray-800">${r.date}</div>
                        <div class="text-sm text-gray-500">类型：${r.type}</div>
                    </div>
                    <div class="text-2xl font-bold text-indigo-600">${r.overallScore}分</div>
                </div>
            </div>
        `).join('');
    }

    function viewReport(index) {
        const reports = JSON.parse(localStorage.getItem('sinan_reports') || '[]');
        if (reports[index]) {
            currentReport = reports[index];
            displayReport(currentReport);
            homePage.classList.add('hidden');
            quizPage.classList.add('hidden');
            reportPage.classList.remove('hidden');

                <div class="space-y-3">
                    ${q.options.map((opt,i) => `
                        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 ${answers[q.id]===i ? 'border-indigo-500 bg-indigo-50' : ''}">
                            <input type="radio" name="answer" value="${i}" class="mr-3" ${answers[q.id]===i ? 'checked' : ''}>
                            <span>${opt}</span>
                        </label>
                    `).join('')}
                </div>
            </div>
        `;
        document.querySelectorAll('input[name="answer"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                answers[q.id] = parseInt(e.target.value);
                document.querySelectorAll('label').forEach(l => l.classList.remove('border-indigo-500','bg-indigo-50'));
                e.target.parentElement.classList.add('border-indigo-500','bg-indigo-50');
            });
        });
        prevBtn.classList.toggle('hidden', currentQuestion === 0);
        nextBtn.textContent = currentQuestion === questions.length-1 ? '查看结果' : '下一题';
    }

    nextBtn.addEventListener('click', () => {
        const q = questions[currentQuestion];
        if (answers[q.id] === undefined) {
            alert('请选择一个选项');
            return;
        }
        if (currentQuestion < questions.length-1) {
            currentQuestion++;
            renderQuestion();
            updateProgress();
        } else {
            generateReport();
            quizPage.classList.add('hidden');
            reportPage.classList.remove('hidden');
        }
    });

    prevBtn.addEventListener('click', () => {
        if (currentQuestion > 0) {
            currentQuestion--;
            renderQuestion();
            updateProgress();
        }
    });

    function updateProgress() {
        const progress = ((currentQuestion+1)/questions.length)*100;
        progressBar.style.width = `${progress}%`;
        progressText.textContent = `${currentQuestion+1}/${questions.length} 题`;
    }

    function generateReport() {
        // 计算各维度得分
        const dimensionScores = {};
        const dimensionCounts = {};

        questions.forEach(q => {
            if (answers[q.id] !== undefined) {
                const score = q.reverse ? (4 - answers[q.id]) : answers[q.id];
                if (!dimensionScores[q.dimension]) {
                    dimensionScores[q.dimension] = 0;
                    dimensionCounts[q.dimension] = 0;
                }
                dimensionScores[q.dimension] += score;
                dimensionCounts[q.dimension]++;
            }
        });

        // 归一化为0-100分
        Object.keys(dimensionScores).forEach(d => {
            dimensionScores[d] = Math.round((dimensionScores[d] / (dimensionCounts[d] * 4)) * 100);
        });

        // 计算分组得分
        const groupScores = {};
        Object.keys(dimensionGroups).forEach(group => {
            const dims = dimensionGroups[group];
            let total = 0;
            dims.forEach(d => {
                total += dimensionScores[d] || 0;
            });
            groupScores[group] = Math.round(total / dims.length);
        });

        // 计算总体得分
        const overallScore = Math.round(
            (groupScores['底层动机'] + groupScores['人格特质'] + groupScores['优势能力'] +
             groupScores['风险承受'] + groupScores['资源积累'] + groupScores['认知水平']) / 6
        );

        // 判断创业类型
        let type = '';
        let typeDesc = '';
        if (overallScore >= 80) {
            type = '超级个体型';
            typeDesc = '你具备创业的全部要素：强烈的动机、优秀的特质、强大的能力、充足的风险承受力、丰富的资源和高认知水平。你有很大几率成为成功创业者！';
        } else if (overallScore >= 60) {
            type = '潜力创业型';
            typeDesc = '你具备创业的基础条件，但在某些方面还有提升空间。建议通过投名状深度核查，明确短板并针对性提升。';
        } else if (overallScore >= 40) {
            type = '谨慎观察型';
            typeDesc = '你的创业基础尚可，但风险承受力和资源积累有待加强。建议先通过投名状深入了解，谨慎决策。';
        } else {
            type = '学习积累型';
            typeDesc = '你当前的创业准备还不充分，建议先积累经验、提升技能、扩展资源。可以考虑从副业或小成本项目开始。';
        }

        // 生成推荐建议
        const recommendations = [];
        if (dimensionScores['mission'] >= 70) recommendations.push('你有强烈的使命感，适合做社会价值导向的项目');
        if (dimensionScores['risk'] >= 70) recommendations.push('你有较强的风险承受力，可以尝试创新或高增长领域');
        if (dimensionScores['execution'] >= 70) recommendations.push('你的执行力很强，适合快节奏的创业模式');
        if (dimensionScores['strategic'] >= 70) recommendations.push('你有战略思维，适合做长期规划和复杂项目');
        if (dimensionScores['resource'] < 50) recommendations.push('建议先积累资源（人脉、资金、技能）再创业');
        if (dimensionScores['cognition'] < 50) recommendations.push('建议提升商业认知，学习商业模式和运营知识');

        const report = {
            date: new Date().toLocaleString('zh-CN'),
            dimensionScores,
            groupScores,
            overallScore,
            type,
            typeDesc,
            recommendations
        };

        currentReport = report;
        displayReport(report);

        // 保存到历史
        const reports = JSON.parse(localStorage.getItem('sinan_reports') || '[]');
        reports.unshift(report);
        if (reports.length > 10) reports.pop(); // 只保留最近10条
        localStorage.setItem('sinan_reports', JSON.stringify(reports));
        historyBtn.classList.remove('hidden');
    }

    function displayReport(report) {
        document.getElementById('report-date').textContent = report.date;
        document.getElementById('result-type').textContent = report.type;
        document.getElementById('result-desc').textContent = report.typeDesc;

        // 显示维度得分
        const container = document.getElementById('dimension-scores');
        container.innerHTML = Object.keys(dimensionGroups).map(group => {
            const dims = dimensionGroups[group];
            let groupTotal = 0;
            const detailHtml = dims.map(d => `
                <div class="flex justify-between text-sm py-1">
                    <span class="text-gray-600">${dimensionNames[d]}</span>
                    <span class="font-bold ${report.dimensionScores[d] >= 70 ? 'text-green-600' : report.dimensionScores[d] >= 50 ? 'text-yellow-600' : 'text-red-600'}">${report.dimensionScores[d]}分</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2 mb-2">
                    <div class="score-bar h-2 rounded-full ${report.dimensionScores[d] >= 70 ? 'bg-green-500' : report.dimensionScores[d] >= 50 ? 'bg-yellow-500' : 'bg-red-500'}" style="width: ${report.dimensionScores[d]}%"></div>
                </div>
            `).join('');
            dims.forEach(d => groupTotal += report.dimensionScores[d]);
            const avg = Math.round(groupTotal / dims.length);

            return `
                <div class="mb-6 fade-in">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-gray-800">${group}</span>
                        <span class="text-2xl font-bold ${avg >= 70 ? 'text-green-600' : avg >= 50 ? 'text-yellow-600' : 'text-red-600'}">${avg}分</span>
                    </div>
                    ${detailHtml}
                </div>
            `;
        }).join('');

        // 显示推荐建议
        document.getElementById('recommendations').innerHTML = report.recommendations.length > 0
            ? report.recommendations.map(r => `<div class="flex items-start gap-2 text-sm"><span class="text-indigo-600">•</span><span>${r}</span></div>`).join('')
            : '<div class="text-gray-500">暂无特别建议，保持当前状态即可</div>';
    }

    saveBtn.addEventListener('click', () => {
        if (!currentReport) return;
        const reports = JSON.parse(localStorage.getItem('sinan_reports') || '[]');
        localStorage.setItem('sinan_reports', JSON.stringify(reports));
        showSaveStatus('✅ 报告已保存到本地');
    });

    copyBtn.addEventListener('click', () => {
        if (!currentReport) return;
        const text = `
幸赋链创业测评报告
测评时间：${currentReport.date}
创业类型：${currentReport.type}
总体得分：${currentReport.overallScore}分

维度得分：
${Object.keys(dimensionGroups).map(group => {
    const dims = dimensionGroups[group];
    let total = 0;
    dims.forEach(d => total += currentReport.dimensionScores[d]);
    return `${group}：${Math.round(total/dims.length)}分`;
}).join('\n')}

推荐建议：
${currentReport.recommendations.join('\n')}
        `.trim();
        navigator.clipboard.writeText(text).then(() => {
            showSaveStatus('✅ 报告已复制到剪贴板');
        });
    });

    downloadBtn.addEventListener('click', () => {
        if (!currentReport) return;
        alert('图片下载功能开发中，请先保存到本地或复制报告');
    });

    function showSaveStatus(msg) {
        const status = document.getElementById('save-status');
        status.textContent = msg;
        status.classList.remove('hidden');
        setTimeout(() => status.classList.add('hidden'), 3000);
    }

    retakeBtn.addEventListener('click', () => {
        currentQuestion = 0;
        answers = {};
        currentReport = null;
        homePage.classList.remove('hidden');
        quizPage.classList.add('hidden');
        reportPage.classList.add('hidden');
        progressBar.style.width = '0%';
        progressText.textContent = '0/60 题';
    });

    // 初始化
    init();
    </script>
</body>
</html>
